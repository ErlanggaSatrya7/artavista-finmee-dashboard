name: Artavista Auto Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build PCF
        run: npm run build

      - name: Deploy to Power Apps
        shell: pwsh
        run: |
          # 1. Download ZIP
          curl.exe -L -o pac.zip https://aka.ms/PowerAppsCLI.zip
          
          # 2. Ekstrak pakai tar.exe (Bawaan Windows, lebih aman dari OperationStopped)
          mkdir pac_tool
          tar.exe -xf pac.zip -C pac_tool
          
          # 3. Jalankan Auth dan Push
          $pacExe = ".\pac_tool\bin\pac.exe"
          & $pacExe auth create --url "${{ secrets.ENVIRONMENT_URL }}" --username "${{ secrets.USERNAME }}" --password "${{ secrets.PASSWORD }}"
          & $pacExe pcf push --publisher-prefix arta