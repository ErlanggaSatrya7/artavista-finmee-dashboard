name: Artavista Auto Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Dependencies
        run: npm install

      # Menggunakan Action resmi Microsoft versi 1 yang lebih stabil
      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/install-microsoft-powerplatform-actions@v1

      # Melakukan Build PCF
      - name: Build PCF
        run: npm run build

      # Melakukan Push ke Environment Artavista
      - name: Deploy PCF
        uses: microsoft/powerplatform-actions/push-pcf@v1
        with:
          environment-url: ${{ secrets.ENVIRONMENT_URL }}
          user-name: ${{ secrets.USERNAME }}
          password-secret: ${{ secrets.PASSWORD }}
          publisher-prefix: 'arta'
          