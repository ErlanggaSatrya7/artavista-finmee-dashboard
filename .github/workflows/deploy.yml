name: Artavista Auto Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build PCF
        run: npm run build

      - name: Deploy to Power Apps
        shell: pwsh
        run: |
          # 1. Download PAC CLI murni lewat curl (terbukti sukses tadi)
          curl.exe -L -o pac.zip https://aka.ms/PowerAppsCLI.zip
          
          # 2. Ekstrak pakai tar.exe (tanpa OperationStopped)
          mkdir pac_tool
          tar.exe -xf pac.zip -C pac_tool
          
          # 3. Alamat pac.exe
          $pacExe = ".\pac_tool\bin\pac.exe"
          
          # 4. Login pakai SERVICE PRINCIPAL (KTP Robot)
          # Tidak akan kena MFA/HP karena pakai Client Secret
          & $pacExe auth create --url "${{ secrets.ENVIRONMENT_URL }}" --tenant "${{ secrets.TENANT_ID }}" --applicationId "${{ secrets.CLIENT_ID }}" --clientSecret "${{ secrets.CLIENT_SECRET }}"
          
          # 5. Push PCF
          & $pacExe pcf push --publisher-prefix arta
          