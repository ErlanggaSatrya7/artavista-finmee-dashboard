name: Artavista Auto Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Dependencies
        run: npm install

      - name: Build PCF
        run: npm run build

      - name: Install and Deploy PAC
        shell: pwsh
        run: |
          # 1. Download Power Platform CLI murni
          $msiPath = "$env:TEMP\pac.msi"
          Invoke-WebRequest -Uri "https://aka.ms/PowerAppsCLI.msi" -OutFile $msiPath
          
          # 2. Install secara diam-diam (Silent Install)
          Start-Process msiexec.exe -ArgumentList "/i $msiPath /qn" -Wait
          
          # 3. Panggil langsung dari lokasi instalasinya (Pasti Ada)
          $pacPath = "C:\Program Files\Microsoft Power Apps CLI\bin\pac.exe"
          
          # 4. Eksekusi Auth dan Push
          & $pacPath auth create --url ${{ secrets.ENVIRONMENT_URL }} --username ${{ secrets.USERNAME }} --password ${{ secrets.PASSWORD }}
          & $pacPath pcf push --publisher-prefix arta
          