name: Artavista Auto Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build PCF
        run: npm run build

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/install-microsoft-powerplatform-actions@v1

      - name: Deploy to Power Apps
        uses: microsoft/powerplatform-actions/push-pcf@v1
        with:
          environment-url: ${{ secrets.ENVIRONMENT_URL }}
          app-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          tenant-id: ${{ secrets.TENANT_ID }}
          publisher-prefix: 'arta'
          