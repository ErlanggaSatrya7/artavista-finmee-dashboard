name: Artavista Auto Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build PCF
        run: npm run build

      - name: Deploy to Power Apps
        shell: pwsh
        run: |
          # 1. Download menggunakan curl (lebih stabil di server)
          curl.exe -L -o pac.zip https://aka.ms/PowerAppsCLI.zip
          
          # 2. Buat folder di lokasi sementara (TEMP) agar tidak bentrok dengan izin folder proyek
          $extractPath = "$env:TEMP\pac_tool"
          if (Test-Path $extractPath) { Remove-Item $extractPath -Recurse -Force }
          New-Item -ItemType Directory -Path $extractPath -Force
          
          # 3. Ekstrak file
          Expand-Archive -Path pac.zip -DestinationPath $extractPath -Force
          
          # 4. Tentukan lokasi pac.exe
          $pacExe = "$extractPath\bin\pac.exe"
          
          # 5. Jalankan Auth dan Push
          # Jika langkah ini gagal, berarti akun Artavista mewajibkan MFA (verifikasi HP)
          & $pacExe auth create --url "${{ secrets.ENVIRONMENT_URL }}" --username "${{ secrets.USERNAME }}" --password "${{ secrets.PASSWORD }}"
          & $pacExe pcf push --publisher-prefix arta
          