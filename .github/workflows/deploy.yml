name: Artavista Auto Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build PCF
        run: npm run build

      - name: Install and Deploy PAC
        shell: pwsh
        run: |
          # 1. Buat folder untuk PAC di dalam folder proyek
          New-Item -ItemType Directory -Force -Path ".\pac_tool"
          
          # 2. Download PAC CLI versi Portable (ZIP)
          Invoke-WebRequest -Uri "https://aka.ms/PowerAppsCLI.zip" -OutFile "pac.zip"
          
          # 3. Ekstrak file ZIP
          Expand-Archive -Path "pac.zip" -DestinationPath ".\pac_tool" -Force
          
          # 4. Tentukan lokasi pac.exe
          $pacPath = ".\pac_tool\bin\pac.exe"
          
          # 5. Jalankan Autentikasi dan Push ke Power Apps
          & $pacPath auth create --url ${{ secrets.ENVIRONMENT_URL }} --username ${{ secrets.USERNAME }} --password ${{ secrets.PASSWORD }}
          & $pacPath pcf push --publisher-prefix arta
          