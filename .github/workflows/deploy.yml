name: Artavista Auto Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Dependencies
        run: npm install

      - name: Install Power Platform CLI
        shell: pwsh
        run: |
          # Install via PowerShell Script resmi
          iex (Invoke-RestMethod -Uri https://aka.ms/PowerAppsCLI.ps1)
          # Daftarkan jalurnya secara paksa ke sistem GitHub
          $pacPath = Join-Path $env:LOCALAPPDATA "Microsoft\PowerAppsCLI\bin"
          echo "$pacPath" >> $env:GITHUB_PATH

      - name: Deploy to Power Apps
        shell: pwsh
        run: |
          # Sekarang panggil pac langsung
          pac auth create --url ${{ secrets.ENVIRONMENT_URL }} --username ${{ secrets.USERNAME }} --password ${{ secrets.PASSWORD }}
          pac pcf push --publisher-prefix arta