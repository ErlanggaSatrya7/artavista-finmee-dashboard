name: Artavista Auto Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build PCF
        run: npm run build

      - name: Install and Deploy PAC
        shell: pwsh
        run: |
          # 1. Buat folder tool agar tidak kena kendala permission folder sistem
          $toolPath = New-Item -ItemType Directory -Force -Path ".\pac_tool"
          
          # 2. Download ZIP PAC CLI (Silent agar tidak timeout/error di log)
          $url = "https://aka.ms/PowerAppsCLI.zip"
          $zipFile = ".\pac.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipFile -ErrorAction SilentlyContinue
          
          # 3. Ekstrak file ZIP secara paksa ke folder tool
          Expand-Archive -Path $zipFile -DestinationPath $toolPath.FullName -Force
          
          # 4. Tentukan lokasi eksekusi pac.exe
          $pacExe = Join-Path $toolPath.FullName "bin\pac.exe"
          
          # 5. Jalankan Auth dan Push menggunakan Rahasia GitHub
          # Pastikan ENVIRONMENT_URL di GitHub Secret tidak diakhiri tanda '/'
          & $pacExe auth create --url "${{ secrets.ENVIRONMENT_URL }}" --username "${{ secrets.USERNAME }}" --password "${{ secrets.PASSWORD }}"
          & $pacExe pcf push --publisher-prefix arta
          