name: Artavista Auto Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Dependencies
        run: npm install

      - name: Install Power Platform CLI
        shell: pwsh
        run: |
          $msiPath = "$env:TEMP\pac.msi"
          Invoke-WebRequest -Uri "https://aka.ms/PowerAppsCLI.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i $msiPath /qn" -Wait
          # Tambahkan ke Path untuk sesi ini secara paksa
          echo "C:\Program Files\Microsoft Power Apps CLI\bin" >> $env:GITHUB_PATH

      - name: Power Platform CLI Deploy
        shell: pwsh
        run: |
          # Sekarang 'pac' seharusnya sudah dikenali
          pac auth create --url ${{ secrets.ENVIRONMENT_URL }} --username ${{ secrets.USERNAME }} --password ${{ secrets.PASSWORD }}
          pac pcf push --publisher-prefix arta